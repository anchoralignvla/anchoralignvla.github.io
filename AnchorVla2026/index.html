<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=/">
  <link rel="canonical" href="https://anchorvla2026.github.io/">
  <meta name="robots" content="noindex">
  <title>Anchor-Align</title>
  <script>
    // Bounce to the canonical root URL, preserving any query string / anchor.
    location.replace('/' + (location.search || '') + (location.hash || ''));
  </script>
</head>
<body>
  <p>Redirecting to <a href="/">anchorvla2026.github.io</a>&hellip;</p>
</body>
</html>
