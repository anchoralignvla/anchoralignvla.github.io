<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="refresh" content="0; url=/">
  <link rel="canonical" href="https://anchorvla2026.github.io/">
  <meta name="robots" content="noindex">
  <title>Anchor-Align</title>
  <script>
    // Any unknown path (old project-page URL, case variant, typo) lands here.
    // Bounce to the canonical root site, keeping any anchor.
    location.replace('/' + (location.hash || ''));
  </script>
</head>
<body>
  <p>Redirecting to <a href="/">anchorvla2026.github.io</a>&hellip;</p>
</body>
</html>
